services:
  - type: web_service
    name: buildtrack-fullstack
    plan: free
    repo: https://github.com/zakarianasim073/construction-project_management-ai
    rootDir: .
    branch: main
    env: node
    envVars:
      - name: PORT
        value: "10000"
      - name: NODE_ENV
        value: production
      - name: MONGO_URI
        sync: false
      - name: JWT_SECRET
        sync: false
      - name: GEMINI_API_KEY
        sync: false
    buildCommand: npm install && npm run build-all
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
